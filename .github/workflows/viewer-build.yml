name: viewer build check

# Mirror the Cloudflare Pages build locally: anything that breaks the
# Pages deploy should fail this workflow first. Runs on PRs that touch
# `viewer/**` and on every push to `main` so a broken viewer commit
# never reaches the Pages production branch.
on:
  pull_request:
    paths:
      - "viewer/**"
      - ".github/workflows/viewer-build.yml"
  push:
    branches:
      - main
    paths:
      - "viewer/**"
      - ".github/workflows/viewer-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: viewer
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run check

      - name: build
        # Hits the public Worker at SURFACEOME_API_BASE (defaults to
        # https://api.deliverome.org/surfaceome) to fetch the catalog.
        # The committed snapshot fallback was dropped — the
        # `surfaceome-viewer` Pages project depends on the Worker
        # being live, so CI should validate that path end-to-end.
        run: npm run build
