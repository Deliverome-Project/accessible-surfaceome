name: D1 backup → R2

# Trigger an offsite SQL-dump backup of the `deliverome_agent_runs` D1
# database whenever changes touch the data the DB stores or the schema /
# uploader that defines it.
#
# The workflow runs `wrangler d1 export` and pushes the dump to the R2
# bucket `deliverome-d1-backups` under a timestamped key plus a stable
# `latest.sql` pointer. Combined with Cloudflare's built-in Time Travel
# (7-30 day automatic point-in-time recovery), this gives us long-term
# offsite versioning with grep-able SQL.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN — scoped to D1:Edit and R2:Edit on the account
#   CLOUDFLARE_ACCOUNT_ID — the account hex
#
# The wrangler CLI uses the API token via CLOUDFLARE_API_TOKEN env var
# without needing `wrangler login`.

on:
  push:
    branches: [main]
    paths:
      # Schema / SQL — any change to the D1 schema triggers a fresh dump.
      - "cloudflare/d1_schema.sql"
      # Eval data — new triage runs land here.
      - "data/eval/triage_subbench_v1/**"
      - "data/eval/triage_benchmark_v1.tsv"
      - "data/eval/triage_haiku_live_run.tsv"
      # Deep-dive output — new SurfaceomeRecord persists here.
      - "data/annotations/**"
      - "data/triage/**"
      # Uploaders / backup scripts.
      - "src/accessible_surfaceome/cloud/**"
      - "scripts/upload_triage_runs_to_d1.py"
      - "scripts/d1_export_to_r2.sh"
      - "scripts/d1_triage_backup.sh"
      - ".github/workflows/d1-backup.yml"
  workflow_dispatch:  # allow manual triggers from the Actions tab

concurrency:
  group: d1-backup-${{ github.ref }}
  cancel-in-progress: false  # don't cancel an in-flight export

jobs:
  export-to-r2:
    runs-on: ubuntu-latest
    # Skip on forked-PR pushes — wrangler auth lives in secrets that
    # forks can't read.
    if: github.repository == 'Deliverome-Project/accessible-surfaceome'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Verify wrangler authentication
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler whoami
          wrangler d1 list

      - name: Export D1 → R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/d1_export_to_r2.sh

      - name: Summary
        if: always()
        run: |
          echo "### D1 → R2 backup" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by changes to: ${GITHUB_EVENT_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Backup uploaded to R2 bucket: \`deliverome-d1-backups\`" >> $GITHUB_STEP_SUMMARY
          echo "Latest pointer: \`d1-backups/deliverome_agent_runs/latest.sql\`" >> $GITHUB_STEP_SUMMARY
