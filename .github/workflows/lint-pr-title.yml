name: Validate PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title shape
        uses: amannn/action-semantic-pull-request@v6
        with:
          types: |
            feat
            fix
            refactor
            perf
            docs
            test
            build
            ci
            chore
          scopes: |
            surface-proteome
            candidates
            retrieval
            pipeline
            reports
            data
            docs
            ci
            deps
          requireScope: false
          subjectPattern: ^.+$
          subjectPatternError: subject must not be empty
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
