exclude: ^(data/)

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff-check
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        # PDB files (Protein Data Bank format) have strict column-positioned
        # fields and an 80-char line specification — stripping trailing
        # whitespace from a partially-filled column could corrupt downstream
        # parsers (3Dmol, biopython, etc.). Exempt them anywhere in the tree.
        exclude: '\.pdb$'
      - id: end-of-file-fixer
        exclude: '\.pdb$'
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: detect-private-key
      # Block `.env` and other credential-bearing files from ever being
      # staged. `.env` is in .gitignore, but a `git add -f` would still
      # slip past it — this hook gives a loud, named error if anyone
      # tries.
      - id: forbid-new-submodules
  - repo: local
    hooks:
      - id: forbid-env-files
        name: "Block .env files (credentials must stay in .gitignored .env)"
        entry: scripts/precommit/forbid_env_files.sh
        language: script
        # Match anything named .env, .env.<anything>, or **/.env at any
        # depth. Allows `.env.example` (the documented template).
        files: '(^|/)\.env(\..*)?$'
        exclude: '\.env\.example$'
      - id: scan-secrets
        name: "Scan staged content for credential-shaped strings"
        entry: scripts/precommit/scan_secrets.py
        language: python
        # Skip vendored / generated / data files; the regex is conservative
        # but the false-positive rate on binary blobs and node_modules is
        # not worth the noise.
        exclude: '^(data/|.*/node_modules/|.*/\.next/|.*/out/|.*\.(lock|tsbuildinfo|fasta|fa)$)'
      - id: check-viewer-types-sync
        name: "Enforce TS↔Pydantic schema sync for the viewer"
        # The script walks SurfaceomeRecord's Pydantic tree and verifies
        # viewer/lib/surfaceome-types.ts declares every reachable field.
        # Triggers on EITHER side of the boundary changing — adding a
        # Pydantic field without updating TS fails the commit; renaming
        # a Pydantic class without updating TS fails. Pydantic is the
        # source of truth.
        entry: uv run --frozen python scripts/check_viewer_types_sync.py
        language: system
        pass_filenames: false
        files: '^(src/accessible_surfaceome/tools/_shared/models\.py|viewer/lib/surfaceome-types\.ts|scripts/check_viewer_types_sync\.py)$'
