<?xml version="1.0" encoding="UTF-8"?>
<!--
  Deep-dive pipeline flow — high-level publication figure.

  Reflects PR #54 / claude/youthful-cannon-0750be circa 2026-06,
  with the in-flight refactors that:
    * promote risks + evidence-quality to A1+A2 block builders,
    * merge cell-state observations into accessibility modulation
      (so the A2 column drops "cell states" as a separate builder),
    * drop the dedicated Stage 2 (Structural + topology data) card —
      that data now appears only as a bulleted input to the
      synthesizer's Reads list.

  Stage 1's full-text fetch uses PMC first, with the Unpaywall PDF
  as a fallback only when PMC has no body. Deterministic post-passes
  (Schweke homo-oligomer, ECD-size, secreted-form, family tags,
  scrub_headline_risks, species post-pass) run after the synthesizer
  and overwrite specific output fields — they're not drawn here.

  Pure shapes + text; every visual unit has an <g id> handle for
  selection/restyling in Illustrator.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1320 540"
     width="1320" height="540"
     font-family="Manrope, Inter, system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A3A3A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="540" fill="#FFFFFF"/>

  <!-- =========================================================== -->
  <!-- Card 1: Stage 1 — Evidence retrieval                         -->
  <!-- =========================================================== -->
  <g id="card-stage1">
    <rect x="32" y="24" width="440" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="48" y="50" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 1</text>
    <text x="48" y="70" font-size="16" font-weight="700" fill="#1A1A1A">
      Evidence retrieval
    </text>
    <text x="48" y="86" font-size="11.5" fill="#6A6A6A">
      Surface Evidence + Surface Expression agents
    </text>

    <!-- Sub-panel A: Deterministic search seeds -->
    <g id="stage1-kickoff">
      <rect x="48" y="98" width="408" height="44" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="118" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">DETERMINISTIC SEARCH SEEDS</text>
      <text x="60" y="134" font-size="11" fill="#5A5A5A">
        template-driven query anchors, fired in parallel  (no LLM)
      </text>
    </g>

    <!-- Sub-panel B: Literature retrieval -->
    <g id="stage1-retrieval">
      <rect x="48" y="154" width="408" height="62" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="174" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">LITERATURE RETRIEVAL  (no LLM)</text>
      <g font-size="11.5">
        <rect x="60" y="186" width="100" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="110" y="201" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubMed</text>
        <rect x="168" y="186" width="120" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="228" y="201" font-weight="600" fill="#FFFFFF" text-anchor="middle">Europe PMC</text>
        <rect x="296" y="186" width="100" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="346" y="201" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubTator</text>
      </g>
    </g>

    <!-- Sub-panel C: Per-paper pipeline -->
    <g id="stage1-pipeline">
      <rect x="48" y="228" width="408" height="174" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="60" y="248" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">PER-PAPER PIPELINE</text>

      <g id="step-abstract-triage">
        <text x="60" y="270" font-size="12.5" font-weight="600" fill="#1A1A1A">abstract triage</text>
        <text x="60" y="284" font-size="10.5" fill="#6A6A6A">discard &#183; keep abstract &#183; worth fetching</text>
        <rect x="390" y="263" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="418" y="275" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="step-fulltext-fetch">
        <text x="60" y="302" font-size="12.5" font-weight="600" fill="#1A1A1A">full-text fetch</text>
        <text x="60" y="316" font-size="10.5" fill="#6A6A6A">PMC; Unpaywall PDF fallback when PMC has no body</text>
        <rect x="390" y="295" width="56" height="18" rx="9" ry="9" fill="#3D6B60"/>
        <text x="418" y="307" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
      </g>
      <g id="step-trim">
        <text x="60" y="334" font-size="12.5" font-weight="600" fill="#1A1A1A">trim</text>
        <text x="60" y="348" font-size="10.5" fill="#6A6A6A">per-paper clip pruning</text>
        <rect x="390" y="327" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="418" y="339" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="step-select">
        <text x="60" y="366" font-size="12.5" font-weight="600" fill="#1A1A1A">select</text>
        <text x="60" y="380" font-size="10.5" fill="#6A6A6A">final evidence picks</text>
        <rect x="390" y="359" width="56" height="18" rx="9" ry="9" fill="#6B1A2A"/>
        <text x="418" y="371" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
      </g>
    </g>

    <text x="48" y="426" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; Surface Evidence + Surface Expression evidence ledgers
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 2: Stage 2 — Block builders                             -->
  <!-- =========================================================== -->
  <g id="card-stage2">
    <rect x="496" y="24" width="460" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="512" y="50" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 2</text>
    <text x="512" y="70" font-size="16" font-weight="700" fill="#1A1A1A">
      Block builders
    </text>
    <text x="512" y="86" font-size="11.5" fill="#6A6A6A">
      run in parallel; one Sonnet call per block
    </text>

    <!-- Surface Evidence column (4 boxes) -->
    <g id="builders-surface-evidence">
      <text x="512" y="110" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">SURFACE EVIDENCE</text>
      <rect x="512" y="118" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="520" y="136" font-size="11.5" font-weight="600" fill="#1A1A1A">evidence quality</text>
      <rect x="512" y="150" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="520" y="168" font-size="11.5" font-weight="600" fill="#1A1A1A">detection methods</text>
      <rect x="512" y="182" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="520" y="200" font-size="11.5" font-weight="600" fill="#1A1A1A">conflicting evidence</text>
      <rect x="512" y="214" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="520" y="232" font-size="11.5" font-weight="600" fill="#1A1A1A">risks</text>
    </g>

    <!-- Surface Expression column (6 boxes; cell states merged into modulation) -->
    <g id="builders-surface-expression">
      <text x="732" y="110" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">SURFACE EXPRESSION</text>
      <rect x="732" y="118" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="740" y="136" font-size="11.5" font-weight="600" fill="#1A1A1A">evidence quality</text>
      <rect x="732" y="150" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="740" y="168" font-size="11.5" font-weight="600" fill="#1A1A1A">tissue expression</text>
      <rect x="732" y="182" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="740" y="200" font-size="11.5" font-weight="600" fill="#1A1A1A">subcellular location</text>
      <rect x="732" y="214" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="740" y="232" font-size="11.5" font-weight="600" fill="#1A1A1A">anatomical accessibility</text>
      <rect x="732" y="246" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="740" y="264" font-size="11.5" font-weight="600" fill="#1A1A1A">accessibility modulation</text>
      <rect x="732" y="278" width="208" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="740" y="296" font-size="11.5" font-weight="600" fill="#1A1A1A">risks</text>
    </g>

    <!-- Model chip -->
    <rect x="512" y="334" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="552" y="349" font-size="11.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>

    <!-- OE note + cell-states-merged note -->
    <text x="512" y="378" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Overexpression context is recorded inside the
    </text>
    <text x="512" y="392" font-size="10.5" font-style="italic" fill="#7A7A7A">
      detection methods block; cell-state observations
    </text>
    <text x="512" y="406" font-size="10.5" font-style="italic" fill="#7A7A7A">
      live inside accessibility modulation.
    </text>

    <text x="512" y="450" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; block drafts (one per builder)
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 3: Stage 3 — Synthesizer                                -->
  <!-- =========================================================== -->
  <g id="card-stage3">
    <rect x="980" y="24" width="320" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="996" y="50" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 3</text>
    <text x="996" y="70" font-size="16" font-weight="700" fill="#1A1A1A">Synthesizer</text>

    <rect x="996" y="86" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="1036" y="101" font-size="11.5" font-weight="600"
          fill="#FFFFFF" text-anchor="middle">Sonnet</text>

    <g id="syn-reads" font-size="11.5" fill="#1A1A1A">
      <text x="996" y="138" font-weight="600">Reads</text>
      <text x="996" y="158">&#8226; block drafts</text>
      <text x="996" y="178">&#8226; both evidence ledgers</text>
      <text x="996" y="198">&#8226; structural + topology data</text>
      <text x="1010" y="214" font-size="10.5" font-style="italic" fill="#6A6A6A">
        DeepTMHMM &#183; AlphaFold &#183; PDBe SIFTS &#183; SURFACE-Bind
      </text>
      <text x="1010" y="228" font-size="10.5" font-style="italic" fill="#6A6A6A">
        Compara paralogs + orthologs &#183; Schweke 2024 homo-oligomers
      </text>
      <text x="996" y="250">&#8226; triage prior</text>
    </g>

    <g id="syn-emits" font-size="11.5" fill="#1A1A1A">
      <text x="996" y="290" font-weight="600">Emits</text>
      <text x="996" y="310">&#8226; executive summary</text>
      <text x="996" y="330">&#8226; filter rollups</text>
      <text x="996" y="350">&#8226; confidence + rationale</text>
    </g>
  </g>

  <!-- =========================================================== -->
  <!-- Connectors — linear data flow now that Stage 2 is gone       -->
  <!-- =========================================================== -->
  <g id="connectors" stroke="#3A3A3A" stroke-width="2" fill="none">
    <line x1="474" y1="254" x2="494" y2="254" marker-end="url(#arrow)"/>
    <line x1="958" y1="254" x2="978" y2="254" marker-end="url(#arrow)"/>
  </g>

  <!-- =========================================================== -->
  <!-- Legend                                                       -->
  <!-- =========================================================== -->
  <g id="legend" font-size="11" fill="#3A3A3A">
    <rect x="40" y="510" width="50" height="16" rx="8" ry="8" fill="#6B1A2A"/>
    <text x="65" y="522" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
    <text x="98" y="522">claude-sonnet-4-6</text>

    <rect x="220" y="510" width="50" height="16" rx="8" ry="8" fill="#C07830"/>
    <text x="245" y="522" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
    <text x="278" y="522">claude-haiku-4-5</text>

    <rect x="396" y="510" width="50" height="16" rx="8" ry="8" fill="#3D6B60"/>
    <text x="421" y="522" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
    <text x="454" y="522">deterministic / retrieval (no LLM)</text>
  </g>

</svg>
