exclude: ^(data/)

repos:
  - repo: local
    hooks:
      - id: check-py
        name: check-py
        entry: bash scripts/check-py.sh
        language: system
        pass_filenames: false
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-json
