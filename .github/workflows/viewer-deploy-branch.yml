name: viewer deploy preview (on-demand)

# On-demand Cloudflare Pages deploy for any branch. Trigger from
# GitHub → Actions → "viewer deploy preview (on-demand)" → Run workflow.
# The Pages project itself should have automatic preview deployments
# disabled (Cloudflare dashboard → Settings → Builds and deployments →
# Configure preview deployments → None) so non-main branches only
# deploy when we explicitly click here.
#
# The production branch (`main`) keeps its own auto-deploy via the
# Cloudflare Git integration; this workflow is for *other* branches.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy (preview alias = sanitized branch name)"
        required: true
        default: ""
      api_base:
        description: "SURFACEOME_API_BASE for the build (use `local` to force snapshot-only)"
        required: false
        default: "local"

concurrency:
  # Don't let two manual deploys of the same branch race each other —
  # the latter cancels the former.
  group: viewer-deploy-${{ github.event.inputs.branch }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: refuse to deploy main here
        # `main` deploys via the Cloudflare Git integration. Running
        # this workflow on `main` would create a second deployment
        # that competes with the production one — block it.
        if: ${{ github.event.inputs.branch == 'main' }}
        run: |
          echo "::error::main deploys automatically via the Cloudflare Git integration; use that path for production."
          exit 1

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: viewer/package-lock.json

      - name: install
        working-directory: viewer
        run: npm ci

      - name: build
        working-directory: viewer
        env:
          SURFACEOME_API_BASE: ${{ github.event.inputs.api_base }}
        run: npm run build

      - name: sanitize branch name for Pages
        id: sanitize
        # Pages branch aliases must be lowercase + alphanumeric + dashes,
        # ≤28 chars. Map anything weird to dashes; truncate to 28.
        run: |
          raw="${{ github.event.inputs.branch }}"
          alias=$(printf '%s' "$raw" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-28)
          echo "alias=$alias" >> "$GITHUB_OUTPUT"
          echo "Will deploy as preview alias: $alias"

      - name: deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy viewer/out
            --project-name=surfaceome-viewer
            --branch=${{ steps.sanitize.outputs.alias }}
            --commit-dirty=true

      - name: summary
        run: |
          alias="${{ steps.sanitize.outputs.alias }}"
          {
            echo "### Deployed \`${{ github.event.inputs.branch }}\` to Pages"
            echo ""
            echo "Preview URL (this deploy):"
            echo "  - \`https://${{ github.sha }}.surfaceome-viewer.pages.dev\`"
            echo "Branch alias (latest deploy of this branch always):"
            echo "  - \`https://${alias}.surfaceome-viewer.pages.dev\`"
            echo ""
            echo "_Tip: the branch-alias URL stays stable across re-deploys; the SHA URL is per-commit._"
          } >> "$GITHUB_STEP_SUMMARY"
