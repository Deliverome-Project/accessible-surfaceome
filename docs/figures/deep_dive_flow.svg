<?xml version="1.0" encoding="UTF-8"?>
<!--
  Deep-dive pipeline flow — high-level publication figure.

  Bio-audience pass: no code identifiers (no SurfaceomeRecord,
  SurfaceEvidenceDraft, BiologicalContextDraft, DeterministicFeatures,
  EvidenceClaim, schema_version), no underscores in method/step names,
  no "in-process" / "Managed Agent" implementation labels.

  Reflects PR #54 / claude/youthful-cannon-0750be circa 2026-06.
  Source-of-truth: docs/prompt_review.html#flow + the runner code itself.

  Pure shapes + text; every visual unit has an <g id> handle for
  selection/restyling in Illustrator.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1240 620"
     width="1240" height="620"
     font-family="Manrope, Inter, system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A3A3A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="620" fill="#FFFFFF"/>

  <!-- =========================================================== -->
  <!-- Title                                                        -->
  <!-- =========================================================== -->
  <g id="title">
    <text x="40" y="40" font-size="22" font-weight="700" fill="#1A1A1A">
      Deep-dive pipeline
    </text>
    <text x="40" y="60" font-size="13" fill="#6A6A6A">
      Per-gene: deterministic search seeds &#8594; literature retrieval &#8594; Surface Evidence + Biology agents &#8594; block builders &#8594; synthesizer.
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 1: Stage 1 — evidence retrieval                         -->
  <!-- =========================================================== -->
  <g id="card-stage1">
    <rect x="32" y="92" width="496" height="476" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="48" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 1</text>
    <text x="48" y="138" font-size="16" font-weight="700" fill="#1A1A1A">
      Evidence retrieval
    </text>
    <text x="48" y="154" font-size="11.5" fill="#6A6A6A">
      Surface Evidence + Biology agents
    </text>

    <!-- Sub-panel A: Deterministic kickoff -->
    <g id="stage1-kickoff">
      <rect x="48" y="166" width="464" height="116" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="186" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">DETERMINISTIC SEARCH SEEDS</text>
      <text x="60" y="202" font-size="11" fill="#5A5A5A">
        template-driven query anchors  (no LLM)
      </text>
      <g font-size="10.5" fill="#1A1A1A">
        <rect x="60" y="214" width="138" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="129" y="226.5" text-anchor="middle">normal-tissue tox</text>
        <rect x="206" y="214" width="138" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="275" y="226.5" text-anchor="middle">surface methods</text>
        <rect x="352" y="214" width="148" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="426" y="226.5" text-anchor="middle">topology + structure</text>

        <rect x="60" y="236" width="138" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="129" y="248.5" text-anchor="middle">shedding + PTM</text>
        <rect x="206" y="236" width="138" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="275" y="248.5" text-anchor="middle">reachability</text>
        <rect x="352" y="236" width="148" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="426" y="248.5" text-anchor="middle">partner dependency</text>

        <rect x="60" y="258" width="216" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="168" y="270.5" text-anchor="middle">membrane subdomain</text>
        <rect x="284" y="258" width="216" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="392" y="270.5" text-anchor="middle">epitope masking</text>
      </g>
    </g>

    <!-- Sub-panel B: Retrieval sources -->
    <g id="stage1-retrieval">
      <rect x="48" y="294" width="464" height="62" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="314" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">LITERATURE RETRIEVAL  (no LLM)</text>
      <g font-size="11.5">
        <rect x="60" y="326" width="100" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="110" y="341" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubMed</text>
        <rect x="168" y="326" width="120" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="228" y="341" font-weight="600" fill="#FFFFFF" text-anchor="middle">Europe PMC</text>
        <rect x="296" y="326" width="100" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="346" y="341" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubTator</text>
      </g>
    </g>

    <!-- Sub-panel C: Per-paper pipeline -->
    <g id="stage1-pipeline">
      <rect x="48" y="368" width="464" height="164" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="60" y="388" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">PER-PAPER PIPELINE</text>

      <g id="step-abstract-triage">
        <text x="60" y="410" font-size="12.5" font-weight="600" fill="#1A1A1A">abstract triage</text>
        <text x="60" y="424" font-size="10.5" fill="#6A6A6A">discard &#183; keep abstract &#183; worth fetching</text>
        <rect x="446" y="403" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="474" y="415" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="step-fulltext-fetch">
        <text x="60" y="442" font-size="12.5" font-weight="600" fill="#1A1A1A">full-text fetch</text>
        <text x="60" y="456" font-size="10.5" fill="#6A6A6A">PMC &#8594; eLink PMCID &#8594; Unpaywall PDF</text>
        <rect x="446" y="435" width="56" height="18" rx="9" ry="9" fill="#3D6B60"/>
        <text x="474" y="447" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
      </g>
      <g id="step-trim">
        <text x="60" y="474" font-size="12.5" font-weight="600" fill="#1A1A1A">trim  (Surface Evidence + Biology)</text>
        <text x="60" y="488" font-size="10.5" fill="#6A6A6A">per-paper clip pruning, dual axis</text>
        <rect x="446" y="467" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="474" y="479" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="step-select">
        <text x="60" y="506" font-size="12.5" font-weight="600" fill="#1A1A1A">select  (Surface Evidence + Biology)</text>
        <text x="60" y="520" font-size="10.5" fill="#6A6A6A">final evidence picks, dual axis</text>
        <rect x="446" y="499" width="56" height="18" rx="9" ry="9" fill="#6B1A2A"/>
        <text x="474" y="511" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
      </g>
    </g>

    <text x="48" y="554" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; Surface Evidence + Biology evidence ledgers
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 2: Stage 2 — structural & topology data                 -->
  <!-- =========================================================== -->
  <g id="card-stage2">
    <rect x="552" y="92" width="180" height="476" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="568" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 2</text>
    <text x="568" y="138" font-size="16" font-weight="700" fill="#1A1A1A">Structural +</text>
    <text x="568" y="156" font-size="16" font-weight="700" fill="#1A1A1A">topology data</text>

    <rect x="568" y="176" width="148" height="22" rx="11" ry="11"
          fill="#E6E2DC" stroke="#A8A8A8" stroke-width="0.75"/>
    <text x="642" y="191" font-size="11" font-weight="600"
          fill="#3A3A3A" text-anchor="middle">no LLM  &#8226;  data lookup</text>

    <g id="stage2-sources" font-size="11.5" fill="#1A1A1A">
      <text x="568" y="222" font-weight="600">Sources</text>
      <text x="568" y="244">&#8226; DeepTMHMM topology</text>
      <text x="568" y="262">&#8226; AlphaFold structure + pLDDT</text>
      <text x="568" y="280">&#8226; PDBe SIFTS &#8211; best PDB</text>
      <text x="568" y="298">&#8226; SURFACE-Bind sites</text>
      <text x="568" y="316">&#8226; Compara paralogs</text>
      <text x="568" y="334">&#8226; cross-species orthologs</text>
      <text x="568" y="352">&#8226; Schweke 2024 homo-oligomers</text>
    </g>
  </g>

  <!-- =========================================================== -->
  <!-- Card 3: Stage 3 — block builders                             -->
  <!-- =========================================================== -->
  <g id="card-stage3">
    <rect x="756" y="92" width="280" height="476" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="772" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 3</text>
    <text x="772" y="138" font-size="16" font-weight="700" fill="#1A1A1A">
      Block builders
    </text>
    <text x="772" y="156" font-size="11.5" fill="#6A6A6A">
      run in parallel; one Sonnet call per block
    </text>

    <!-- Surface Evidence column -->
    <g id="builders-surface-evidence">
      <text x="772" y="186" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">SURFACE EVIDENCE</text>
      <rect x="772" y="194" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="780" y="212" font-size="11.5" font-weight="600" fill="#1A1A1A">methods</text>
      <rect x="772" y="226" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="780" y="244" font-size="11.5" font-weight="600" fill="#1A1A1A">contradiction</text>
      <rect x="772" y="258" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="780" y="276" font-size="11.5" font-weight="600" fill="#1A1A1A">evidence grade</text>
    </g>

    <!-- Biology column -->
    <g id="builders-biology">
      <text x="902" y="186" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">BIOLOGY</text>
      <rect x="902" y="194" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="212" font-size="11.5" font-weight="600" fill="#1A1A1A">expression</text>
      <rect x="902" y="226" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="244" font-size="11.5" font-weight="600" fill="#1A1A1A">cell states</text>
      <rect x="902" y="258" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="276" font-size="11.5" font-weight="600" fill="#1A1A1A">subcellular localization</text>
      <rect x="902" y="290" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="308" font-size="11.5" font-weight="600" fill="#1A1A1A">anatomical accessibility</text>
      <rect x="902" y="322" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="340" font-size="11.5" font-weight="600" fill="#1A1A1A">accessibility modulation</text>
    </g>

    <!-- Model chip -->
    <rect x="772" y="370" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="812" y="385" font-size="11.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>

    <!-- OE note -->
    <text x="772" y="412" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Overexpression context, when used,
    </text>
    <text x="772" y="426" font-size="10.5" font-style="italic" fill="#7A7A7A">
      is recorded inside the methods block.
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 4: Stage 4 — synthesizer                                -->
  <!-- =========================================================== -->
  <g id="card-stage4">
    <rect x="1060" y="92" width="148" height="476" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="1076" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 4</text>
    <text x="1076" y="138" font-size="16" font-weight="700" fill="#1A1A1A">Synthesizer</text>

    <rect x="1076" y="158" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="1116" y="173" font-size="11.5" font-weight="600"
          fill="#FFFFFF" text-anchor="middle">Sonnet</text>

    <g id="syn-reads" font-size="11" fill="#1A1A1A">
      <text x="1076" y="206" font-weight="600">Reads</text>
      <text x="1076" y="224">&#8226; 8 block drafts</text>
      <text x="1076" y="240">&#8226; both evidence ledgers</text>
      <text x="1076" y="256">&#8226; structural data</text>
      <text x="1076" y="272">&#8226; triage prior</text>
    </g>

    <g id="syn-emits" font-size="11" fill="#1A1A1A">
      <text x="1076" y="306" font-weight="600">Emits</text>
      <text x="1076" y="324">&#8226; executive summary</text>
      <text x="1076" y="340">&#8226; filter rollups</text>
      <text x="1076" y="356">&#8226; accessibility risks</text>
      <text x="1076" y="372">&#8226; confidence + rationale</text>
    </g>

    <text x="1076" y="468" font-size="12" font-weight="700" fill="#1A1A1A">
      &#8594; Per-gene annotation
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Connectors                                                   -->
  <!-- =========================================================== -->
  <g id="connectors" stroke="#3A3A3A" stroke-width="2" fill="none">
    <line x1="530" y1="330" x2="550" y2="330" marker-end="url(#arrow)"/>
    <line x1="734" y1="330" x2="754" y2="330" marker-end="url(#arrow)"/>
    <line x1="1038" y1="330" x2="1058" y2="330" marker-end="url(#arrow)"/>
  </g>

  <!-- =========================================================== -->
  <!-- Legend + clarifying footnote                                 -->
  <!-- =========================================================== -->
  <g id="legend" font-size="11" fill="#3A3A3A">
    <rect x="40" y="582" width="50" height="16" rx="8" ry="8" fill="#6B1A2A"/>
    <text x="65" y="594" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
    <text x="98" y="594">claude-sonnet-4-6</text>

    <rect x="220" y="582" width="50" height="16" rx="8" ry="8" fill="#C07830"/>
    <text x="245" y="594" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
    <text x="278" y="594">claude-haiku-4-5</text>

    <rect x="396" y="582" width="50" height="16" rx="8" ry="8" fill="#3D6B60"/>
    <text x="421" y="594" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
    <text x="454" y="594">deterministic / retrieval (no LLM)</text>

    <text x="680" y="594" font-style="italic" fill="#6A6A6A">
      Dashed query anchors fire for membrane proteins (TM &#8805; 1, ECD &#8805; 30 aa) or when topology is unknown.
    </text>
  </g>

</svg>
