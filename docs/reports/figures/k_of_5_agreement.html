<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>k-of-5 agreement distribution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700;1,6..72,400;1,6..72,500&display=swap"
    />
    <style>
      :root {
        --accent: #6f0835;
        --red-700: #b14849;
        --red-500: #e2655e;
        --ink: #141414;
        --ink-soft: #1f1718;
        --muted: #5a5f64;
        --bg: #fefefc;
        --font-sans: "DM Sans", "Inter", "Segoe UI", system-ui, sans-serif;
        --font-display: "Newsreader", Georgia, "Iowan Old Style", serif;
      }

      @page {
        size: 7in 2.6in;
        margin: 0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--ink-soft);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .figure {
        width: 7in;
        height: 2.6in;
        padding: 0.34in 0.42in 0.30in;
        background: var(--bg);
      }

      h1 {
        margin: 0 0 0.04in;
        font-family: var(--font-display);
        font-weight: 600;
        font-size: 16pt;
        line-height: 1.15;
        color: var(--ink);
        letter-spacing: -0.01em;
      }

      .subtitle {
        margin: 0 0 0.20in;
        font-family: var(--font-display);
        font-style: italic;
        font-weight: 400;
        font-size: 10.5pt;
        color: var(--muted);
        font-variant-numeric: lining-nums tabular-nums;
      }

      .agree-bars {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 7px 14px;
        align-items: center;
        font-family: var(--font-sans);
        font-size: 10pt;
        font-variant-numeric: lining-nums tabular-nums;
      }

      .agree-bars .ak {
        color: var(--muted);
        font-weight: 600;
        letter-spacing: 0.04em;
        text-align: right;
        white-space: nowrap;
      }

      .agree-bars .abar {
        height: 14px;
        background: var(--accent);
        border-radius: 2.5px;
        min-width: 4px;
      }

      .agree-bars .abar.soft { background: var(--red-500); }
      .agree-bars .abar.mid  { background: var(--red-700); }

      .agree-bars .av {
        color: var(--ink-soft);
        font-weight: 600;
        text-align: right;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="figure">
      <h1>Cross-source agreement on candidate human surface proteins</h1>
      <div class="subtitle">n = 5,680 proteins · 5 independent sources of surface-localization evidence</div>
      <div class="agree-bars">
        <div class="ak">1 of 5</div><div class="abar soft" style="width:100%"></div><div class="av">2,474</div>
        <div class="ak">2 of 5</div><div class="abar mid"  style="width:65.6%"></div><div class="av">1,624</div>
        <div class="ak">3 of 5</div><div class="abar mid"  style="width:37.3%"></div><div class="av">923</div>
        <div class="ak">4 of 5</div><div class="abar"      style="width:19.0%"></div><div class="av">471</div>
        <div class="ak">5 of 5</div><div class="abar"      style="width:7.6%"></div><div class="av">188</div>
      </div>
    </div>
  </body>
</html>
