<?xml version="1.0" encoding="UTF-8"?>
<!--
  Deep-dive pipeline flow — high-level publication figure.

  Reflects PR #54 / claude/youthful-cannon-0750be circa 2026-06.
  Source-of-truth: docs/prompt_review.html#flow + the runner code itself.

  No planner: the planner step was replaced by a deterministic kickoff
  template (kickoff_templates.build_kickoff); see runner.py line 229,
  "planner is replaced by a deterministic kickoff template." The Stage-1
  LLM agents are abstract_triage + fetch (Haiku), a1/a2 trim (Haiku),
  and a1/a2 select (Sonnet, dual).

  Upstream inputs (cohort row + triage prior) are intentionally omitted
  from this figure — focus is on the deep-dive pipeline itself.

  Pure shapes + text; every visual unit has an <g id> handle for
  selection/restyling in Illustrator.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1240 580"
     width="1240" height="580"
     font-family="Manrope, Inter, system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A3A3A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="580" fill="#FFFFFF"/>

  <!-- =========================================================== -->
  <!-- Title                                                        -->
  <!-- =========================================================== -->
  <g id="title">
    <text x="40" y="40" font-size="22" font-weight="700" fill="#1A1A1A">
      Deep-dive pipeline (v2)
    </text>
    <text x="40" y="60" font-size="13" fill="#6A6A6A">
      Per-gene: deterministic search kickoff &#8594; literature retrieval &#8594; dual A1/A2 ledger &#8594; parallel block builders &#8594; synthesizer.
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 1: Stage 1 — plan_trim_select                           -->
  <!-- =========================================================== -->
  <g id="card-stage1">
    <rect x="32" y="92" width="496" height="448" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="48" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 1</text>
    <text x="48" y="138" font-size="16" font-weight="700" fill="#1A1A1A">
      plan_trim_select  (dual A1 / A2)
    </text>

    <!-- Sub-panel A: Deterministic kickoff -->
    <g id="stage1-kickoff">
      <rect x="48" y="152" width="464" height="116" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="172" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">DETERMINISTIC KICKOFF</text>
      <text x="60" y="188" font-size="11" fill="#5A5A5A">
        template-driven search anchors  (no LLM)
      </text>
      <!-- 8 anchor chips, 4 standing + 4 gated -->
      <g font-size="10.5" fill="#1A1A1A">
        <rect x="60" y="200" width="138" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="129" y="212.5" text-anchor="middle">normal-tissue tox</text>
        <rect x="206" y="200" width="138" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="275" y="212.5" text-anchor="middle">surface methods</text>
        <rect x="352" y="200" width="148" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="426" y="212.5" text-anchor="middle">topology + structure</text>

        <rect x="60" y="222" width="138" height="18" rx="4" ry="4"
              fill="#FFFFFF" stroke="#9CB7AE"/>
        <text x="129" y="234.5" text-anchor="middle">shedding + PTM</text>
        <rect x="206" y="222" width="138" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="275" y="234.5" text-anchor="middle">reachability</text>
        <rect x="352" y="222" width="148" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="426" y="234.5" text-anchor="middle">partner dependency</text>

        <rect x="60" y="244" width="216" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="168" y="256.5" text-anchor="middle">membrane subdomain</text>
        <rect x="284" y="244" width="216" height="18" rx="4" ry="4"
              fill="#FAF7F2" stroke="#9CB7AE" stroke-dasharray="3 2"/>
        <text x="392" y="256.5" text-anchor="middle">epitope masking</text>
      </g>
    </g>

    <!-- Sub-panel B: Retrieval -->
    <g id="stage1-retrieval">
      <rect x="48" y="280" width="464" height="62" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="300" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">RETRIEVAL  (no LLM)</text>
      <g font-size="11.5">
        <rect x="60" y="312" width="100" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="110" y="327" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubMed</text>
        <rect x="168" y="312" width="120" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="228" y="327" font-weight="600" fill="#FFFFFF" text-anchor="middle">Europe PMC</text>
        <rect x="296" y="312" width="100" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="346" y="327" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubTator</text>
      </g>
    </g>

    <!-- Sub-panel C: LLM pipeline (3 agents) -->
    <g id="stage1-llm">
      <rect x="48" y="354" width="464" height="136" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="60" y="374" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">LLM PIPELINE</text>

      <g id="llm-triage">
        <text x="60" y="398" font-size="12.5" font-weight="600" fill="#1A1A1A">abstract_triage + fetch</text>
        <text x="60" y="412" font-size="10.5" fill="#6A6A6A">discard / keep_abstract / worth_fetching</text>
        <rect x="446" y="391" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="474" y="403" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="llm-trim">
        <text x="60" y="434" font-size="12.5" font-weight="600" fill="#1A1A1A">a1_trim + a2_trim</text>
        <text x="60" y="448" font-size="10.5" fill="#6A6A6A">per-paper clip pruning, dual axis</text>
        <rect x="446" y="427" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="474" y="439" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="llm-select">
        <text x="60" y="470" font-size="12.5" font-weight="600" fill="#1A1A1A">a1_select + a2_select</text>
        <text x="60" y="484" font-size="10.5" fill="#6A6A6A">EvidenceClaim ledgers, dual axis</text>
        <rect x="446" y="463" width="56" height="18" rx="9" ry="9" fill="#6B1A2A"/>
        <text x="474" y="475" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
      </g>
    </g>

    <text x="48" y="514" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; A1 + A2 EvidenceClaim ledgers
    </text>
    <text x="48" y="529" font-size="10.5" fill="#6A6A6A">
      ~50&#8211;80 (A1) + ~30&#8211;60 (A2) claims; search-log audit trail
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 2: Stage 2 — fetch_deterministic_features               -->
  <!-- =========================================================== -->
  <g id="card-stage2">
    <rect x="552" y="92" width="180" height="448" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="568" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 2</text>
    <text x="568" y="138" font-size="16" font-weight="700" fill="#1A1A1A">fetch_</text>
    <text x="568" y="156" font-size="16" font-weight="700" fill="#1A1A1A">deterministic_features</text>

    <rect x="568" y="176" width="148" height="22" rx="11" ry="11"
          fill="#E6E2DC" stroke="#A8A8A8" stroke-width="0.75"/>
    <text x="642" y="191" font-size="11" font-weight="600"
          fill="#3A3A3A" text-anchor="middle">no LLM  &#8226;  tool pulls</text>

    <g id="stage2-sources" font-size="11.5" fill="#1A1A1A">
      <text x="568" y="222" font-weight="600">Data sources</text>
      <text x="568" y="244">&#8226; D1 topology (DeepTMHMM)</text>
      <text x="568" y="262">&#8226; AFDB structure + pLDDT</text>
      <text x="568" y="280">&#8226; PDBe SIFTS  best PDB</text>
      <text x="568" y="298">&#8226; SURFACE-Bind sites</text>
      <text x="568" y="316">&#8226; Compara paralogs</text>
      <text x="568" y="334">&#8226; cross-species orthologs</text>
      <text x="568" y="352">&#8226; Schweke 2024 (homo-olig)</text>
    </g>

    <text x="568" y="402" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; DeterministicFeatures
    </text>
    <text x="568" y="418" font-size="10.5" fill="#6A6A6A">
      consumed by Stages 3 + 4
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 3: Stage 3 — 8 block builders                           -->
  <!-- =========================================================== -->
  <g id="card-stage3">
    <rect x="756" y="92" width="280" height="448" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="772" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 3</text>
    <text x="772" y="138" font-size="16" font-weight="700" fill="#1A1A1A">
      8 block builders
    </text>
    <text x="772" y="156" font-size="11.5" fill="#6A6A6A">
      run in parallel; one Sonnet call per block
    </text>

    <!-- A1 column -->
    <g id="builders-a1">
      <text x="772" y="186" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">A1  surface evidence</text>
      <rect x="772" y="194" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="780" y="212" font-size="11.5" font-weight="600" fill="#1A1A1A">methods</text>
      <rect x="772" y="226" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="780" y="244" font-size="11.5" font-weight="600" fill="#1A1A1A">contradiction</text>
      <rect x="772" y="258" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="780" y="276" font-size="11.5" font-weight="600" fill="#1A1A1A">evidence_grade</text>
    </g>

    <!-- A2 column -->
    <g id="builders-a2">
      <text x="902" y="186" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">A2  biology</text>
      <rect x="902" y="194" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="212" font-size="11.5" font-weight="600" fill="#1A1A1A">expression</text>
      <rect x="902" y="226" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="244" font-size="11.5" font-weight="600" fill="#1A1A1A">cell_states</text>
      <rect x="902" y="258" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="276" font-size="11.5" font-weight="600" fill="#1A1A1A">subcellular_loc.</text>
      <rect x="902" y="290" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="308" font-size="11.5" font-weight="600" fill="#1A1A1A">anatomical_acc.</text>
      <rect x="902" y="322" width="118" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="910" y="340" font-size="11.5" font-weight="600" fill="#1A1A1A">accessibility_mod.</text>
    </g>

    <!-- Model chip -->
    <rect x="772" y="370" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="812" y="385" font-size="11.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
    <text x="860" y="385" font-size="11.5" fill="#3A3A3A">in-process</text>

    <!-- OE note -->
    <text x="772" y="412" font-size="10.5" font-style="italic" fill="#7A7A7A">
      OE / expression_system lives
    </text>
    <text x="772" y="426" font-size="10.5" font-style="italic" fill="#7A7A7A">
      inside methods (not its own builder).
    </text>

    <!-- Output -->
    <text x="772" y="462" font-size="11" font-weight="600" fill="#3A3A3A">Outputs</text>
    <text x="772" y="478" font-size="11" fill="#6A6A6A">SurfaceEvidence draft  (A1)</text>
    <text x="772" y="494" font-size="11" fill="#6A6A6A">BiologicalContext draft  (A2)</text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 4: Stage 4 — synthesizer                                -->
  <!-- =========================================================== -->
  <g id="card-stage4">
    <rect x="1060" y="92" width="148" height="448" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="1076" y="118" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 4</text>
    <text x="1076" y="138" font-size="16" font-weight="700" fill="#1A1A1A">surfaceome_</text>
    <text x="1076" y="156" font-size="16" font-weight="700" fill="#1A1A1A">synthesizer</text>

    <rect x="1076" y="176" width="116" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="1134" y="191" font-size="11" font-weight="600"
          fill="#FFFFFF" text-anchor="middle">Sonnet  in-process</text>

    <g id="syn-reads" font-size="11" fill="#1A1A1A">
      <text x="1076" y="222" font-weight="600">Reads</text>
      <text x="1076" y="240">&#8226; 8 block drafts</text>
      <text x="1076" y="256">&#8226; A1 + A2 ledgers</text>
      <text x="1076" y="272">&#8226; det. features</text>
      <text x="1076" y="288">&#8226; triage prior</text>
    </g>

    <g id="syn-emits" font-size="11" fill="#1A1A1A">
      <text x="1076" y="316" font-weight="600">Emits</text>
      <text x="1076" y="334">&#8226; executive_summary</text>
      <text x="1076" y="350">&#8226; filters_llm</text>
      <text x="1076" y="366" font-weight="600" fill="#6B1A2A">&#8226; accessibility_risks</text>
      <text x="1076" y="382">&#8226; confidence + reason</text>
    </g>

    <text x="1076" y="412" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Risks originate here, not in
    </text>
    <text x="1076" y="426" font-size="10.5" font-style="italic" fill="#7A7A7A">
      any builder.
    </text>

    <text x="1076" y="450" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Not a Managed Agent.
    </text>

    <text x="1076" y="484" font-size="12" font-weight="700" fill="#1A1A1A">
      &#8594; SurfaceomeRecord
    </text>
    <text x="1076" y="500" font-size="11" fill="#6A6A6A">
      D1 + viewer
    </text>
    <text x="1076" y="516" font-size="10.5" font-style="italic" fill="#7A7A7A">
      + deterministic post-passes
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Connectors                                                   -->
  <!-- =========================================================== -->
  <g id="connectors" stroke="#3A3A3A" stroke-width="2" fill="none">
    <line x1="530" y1="316" x2="550" y2="316" marker-end="url(#arrow)"/>
    <line x1="734" y1="316" x2="754" y2="316" marker-end="url(#arrow)"/>
    <line x1="1038" y1="316" x2="1058" y2="316" marker-end="url(#arrow)"/>
  </g>

  <!-- =========================================================== -->
  <!-- Legend                                                       -->
  <!-- =========================================================== -->
  <g id="legend" font-size="11" fill="#3A3A3A">
    <rect x="40" y="552" width="50" height="16" rx="8" ry="8" fill="#6B1A2A"/>
    <text x="65" y="564" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
    <text x="98" y="564">claude-sonnet-4-6</text>

    <rect x="220" y="552" width="50" height="16" rx="8" ry="8" fill="#C07830"/>
    <text x="245" y="564" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
    <text x="278" y="564">claude-haiku-4-5</text>

    <rect x="396" y="552" width="50" height="16" rx="8" ry="8" fill="#3D6B60"/>
    <text x="421" y="564" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
    <text x="454" y="564">deterministic / retrieval (no LLM)</text>

    <text x="680" y="564" font-style="italic" fill="#6A6A6A">
