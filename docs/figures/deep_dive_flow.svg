<?xml version="1.0" encoding="UTF-8"?>
<!--
  Deep-dive pipeline flow — high-level publication figure.

  Reflects the CURRENT state of the code on PR #54 / claude/youthful-cannon-0750be
  (tip ~mid-2026-06).  Sources:
    * Stage 1: src/accessible_surfaceome/agents/plan_trim_select/runner.py
      (run_plan_trim_select_dual → run_plan_trim_select; HAIKU_MODEL +
      SONNET_MODEL at lines 128-129)
    * Stage 2: src/accessible_surfaceome/agents/surfaceome_v2/orchestrator.py
      (AGENT_MODEL = "claude-sonnet-4-6" at line 98; 8 builder prompts at
      agents/surfaceome_v2/prompts/*_builder_system.md)
    * Stage 3: src/accessible_surfaceome/agents/surfaceome_synthesizer/runner.py
      (AGENT_MODEL = "claude-sonnet-4-6" at line 56; messages.create — NOT a
      Managed Agent on the v2 path, per CLAUDE.md)
    * Side inputs: surface_triage TriageRecord loaded via
      orchestrator._load_triage_record; fetch_deterministic_features pulls
      AFDB + PDBe SIFTS + SURFACE-Bind + D1 (no LLM)

  Edit-in-Illustrator-friendly: all shapes are basic <rect>/<line>/<text>,
  every visual unit has an <g id="..."> handle, no CSS / SMIL / filters.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1240 640"
     width="1240" height="640"
     font-family="Manrope, Inter, system-ui, -apple-system, sans-serif">

  <!-- ============================================================== -->
  <!-- Defs: arrowhead markers                                         -->
  <!-- ============================================================== -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A3A3A"/>
    </marker>
    <marker id="arrow-faded" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8A8A8A"/>
    </marker>
  </defs>

  <!-- ============================================================== -->
  <!-- Page background + title                                         -->
  <!-- ============================================================== -->
  <rect x="0" y="0" width="1240" height="640" fill="#FFFFFF"/>

  <g id="title">
    <text x="40" y="42" font-size="22" font-weight="700" fill="#1A1A1A">
      Deep-dive pipeline (v2)
    </text>
    <text x="40" y="64" font-size="13" fill="#6A6A6A">
      Per-gene: evidence retrieval &#8594; per-block analysis &#8594; synthesis.
      Triage and deterministic features are upstream inputs.
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- Side inputs (top: triage record; bottom: deterministic features)-->
  <!-- ============================================================== -->
  <g id="input-triage">
    <rect x="40" y="110" width="200" height="78" rx="8" ry="8"
          fill="#FAF7F2" stroke="#B9AE9C" stroke-width="1.25"/>
    <text x="52" y="132" font-size="11" font-weight="700"
          letter-spacing="0.06em" fill="#7A5C2D">PREREQ INPUT</text>
    <text x="52" y="154" font-size="14" font-weight="600" fill="#1A1A1A">
      Triage record
    </text>
    <text x="52" y="172" font-size="11.5" fill="#5A5A5A">
      from D1; written by upstream
    </text>
    <text x="52" y="186" font-size="11.5" fill="#5A5A5A">
      surface_triage sweep (Sonnet)
    </text>
  </g>

  <g id="input-deterministic">
    <rect x="40" y="468" width="240" height="92" rx="8" ry="8"
          fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1.25"/>
    <text x="52" y="490" font-size="11" font-weight="700"
          letter-spacing="0.06em" fill="#2E5A4C">DETERMINISTIC FEATURES</text>
    <text x="52" y="512" font-size="14" font-weight="600" fill="#1A1A1A">
      No LLM &#8212; pulled from
    </text>
    <text x="52" y="530" font-size="11.5" fill="#5A5A5A">
      AFDB &#183; PDBe SIFTS &#183; SURFACE-Bind
    </text>
    <text x="52" y="546" font-size="11.5" fill="#5A5A5A">
      topology &#183; orthologs &#183; paralogs &#183; D1
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- Stage 1 — plan_trim_select                                      -->
  <!-- ============================================================== -->
  <g id="stage-1-plan-trim-select">
    <rect x="300" y="110" width="280" height="450" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>

    <!-- Stage banner -->
    <text x="316" y="138" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 1</text>
    <text x="316" y="162" font-size="17" font-weight="700" fill="#1A1A1A">
      plan_trim_select
    </text>
    <text x="316" y="180" font-size="11.5" fill="#6A6A6A">
      dual A1 / A2 evidence retrieval
    </text>

    <!-- 5 sub-steps as small white boxes -->
    <g id="s1-resolve">
      <rect x="316" y="200" width="248" height="50" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="328" y="220" font-size="13" font-weight="600" fill="#1A1A1A">
        resolve
      </text>
      <text x="328" y="237" font-size="11" fill="#6A6A6A">
        HGNC id &#8594; canonical UniProt / Ensembl
      </text>
      <rect x="497" y="208" width="56" height="18" rx="9" ry="9"
            fill="#E6E2DC" stroke="#A8A8A8" stroke-width="0.75"/>
      <text x="525" y="220" font-size="10.5" font-weight="600" fill="#3A3A3A"
            text-anchor="middle">det.</text>
    </g>

    <g id="s1-discover">
      <rect x="316" y="260" width="248" height="50" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="328" y="280" font-size="13" font-weight="600" fill="#1A1A1A">
        discover
      </text>
      <text x="328" y="297" font-size="11" fill="#6A6A6A">
        planner emits PubMed / EuropePMC queries
      </text>
      <rect x="497" y="268" width="56" height="18" rx="9" ry="9"
            fill="#6B1A2A" stroke="#6B1A2A" stroke-width="0.75"/>
      <text x="525" y="280" font-size="10.5" font-weight="600" fill="#FFFFFF"
            text-anchor="middle">Sonnet</text>
    </g>

    <g id="s1-abstract-triage-fetch">
      <rect x="316" y="320" width="248" height="50" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="328" y="340" font-size="13" font-weight="600" fill="#1A1A1A">
        abstract_triage &#43; fetch
      </text>
      <text x="328" y="357" font-size="11" fill="#6A6A6A">
        discard &#183; keep_abstract &#183; worth_fetching
      </text>
      <rect x="497" y="328" width="56" height="18" rx="9" ry="9"
            fill="#C07830" stroke="#C07830" stroke-width="0.75"/>
      <text x="525" y="340" font-size="10.5" font-weight="600" fill="#FFFFFF"
            text-anchor="middle">Haiku</text>
    </g>

    <g id="s1-trim">
      <rect x="316" y="380" width="248" height="50" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="328" y="400" font-size="13" font-weight="600" fill="#1A1A1A">
        a1_trim &#43; a2_trim
      </text>
      <text x="328" y="417" font-size="11" fill="#6A6A6A">
        per-paper clip pruning, dual axis
      </text>
      <rect x="497" y="388" width="56" height="18" rx="9" ry="9"
            fill="#C07830" stroke="#C07830" stroke-width="0.75"/>
      <text x="525" y="400" font-size="10.5" font-weight="600" fill="#FFFFFF"
            text-anchor="middle">Haiku</text>
    </g>

    <g id="s1-select">
      <rect x="316" y="440" width="248" height="50" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="328" y="460" font-size="13" font-weight="600" fill="#1A1A1A">
        a1_select &#43; a2_select
      </text>
      <text x="328" y="477" font-size="11" fill="#6A6A6A">
        EvidenceClaim ledger, dual axis
      </text>
      <rect x="497" y="448" width="56" height="18" rx="9" ry="9"
            fill="#6B1A2A" stroke="#6B1A2A" stroke-width="0.75"/>
      <text x="525" y="460" font-size="10.5" font-weight="600" fill="#FFFFFF"
            text-anchor="middle">Sonnet</text>
    </g>

    <!-- Output caption -->
    <text x="316" y="513" font-size="11.5" font-weight="600" fill="#3A3A3A">
      &#8594; A1 + A2 EvidenceClaim ledgers
    </text>
    <text x="316" y="529" font-size="11" fill="#6A6A6A">
      ~50&#8211;80 (A1) + ~30&#8211;60 (A2) claims, plus search log
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- Stage 2 — 8 block builders in parallel                          -->
  <!-- ============================================================== -->
  <g id="stage-2-block-builders">
    <rect x="620" y="110" width="320" height="450" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>

    <text x="636" y="138" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 2</text>
    <text x="636" y="162" font-size="17" font-weight="700" fill="#1A1A1A">
      8 block builders
    </text>
    <text x="636" y="180" font-size="11.5" fill="#6A6A6A">
      run in parallel; one Sonnet call per block
    </text>

    <!-- Builder grid: 2 columns × 4 rows -->
    <g id="builder-grid">
      <!-- col1 -->
      <g><rect x="636" y="200" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="645" y="222" font-size="11.5" font-weight="600" fill="#1A1A1A">
          accessibility_modulation</text></g>
      <g><rect x="636" y="246" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="645" y="268" font-size="11.5" font-weight="600" fill="#1A1A1A">
          anatomical_accessibility</text></g>
      <g><rect x="636" y="292" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="645" y="314" font-size="11.5" font-weight="600" fill="#1A1A1A">
          cell_states</text></g>
      <g><rect x="636" y="338" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="645" y="360" font-size="11.5" font-weight="600" fill="#1A1A1A">
          contradiction</text></g>
      <!-- col2 -->
      <g><rect x="786" y="200" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="795" y="222" font-size="11.5" font-weight="600" fill="#1A1A1A">
          evidence_grade</text></g>
      <g><rect x="786" y="246" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="795" y="268" font-size="11.5" font-weight="600" fill="#1A1A1A">
          expression</text></g>
      <g><rect x="786" y="292" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="795" y="314" font-size="11.5" font-weight="600" fill="#1A1A1A">
          methods</text></g>
      <g><rect x="786" y="338" width="138" height="36" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
        <text x="795" y="360" font-size="11.5" font-weight="600" fill="#1A1A1A">
          subcellular_localization</text></g>
    </g>

    <!-- Model chip -->
    <rect x="636" y="406" width="100" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A" stroke-width="0.75"/>
    <text x="686" y="421" font-size="11.5" font-weight="600" fill="#FFFFFF"
          text-anchor="middle">Sonnet</text>
    <text x="746" y="421" font-size="11.5" fill="#3A3A3A">
      in-process
    </text>

    <!-- Inputs caption -->
    <text x="636" y="460" font-size="11.5" font-weight="600" fill="#3A3A3A">
      Inputs per block
    </text>
    <text x="636" y="476" font-size="11" fill="#6A6A6A">
      Triage prior, EvidenceClaim ledgers,
    </text>
    <text x="636" y="490" font-size="11" fill="#6A6A6A">
      deterministic features
    </text>

    <!-- Output caption -->
    <text x="636" y="520" font-size="11.5" font-weight="600" fill="#3A3A3A">
      &#8594; 8 BlockDraft objects
    </text>
    <text x="636" y="536" font-size="11" fill="#6A6A6A">
      structured-output validated per block
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- Stage 3 — synthesizer                                           -->
  <!-- ============================================================== -->
  <g id="stage-3-synthesizer">
    <rect x="980" y="110" width="220" height="450" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>

    <text x="996" y="138" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 3</text>
    <text x="996" y="162" font-size="17" font-weight="700" fill="#1A1A1A">
      surfaceome_
    </text>
    <text x="996" y="182" font-size="17" font-weight="700" fill="#1A1A1A">
      synthesizer
    </text>
    <text x="996" y="200" font-size="11.5" fill="#6A6A6A">
      single Sonnet call
    </text>

    <!-- Body -->
    <rect x="996" y="220" width="188" height="148" rx="6" ry="6"
          fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
    <text x="1008" y="242" font-size="12" font-weight="600" fill="#1A1A1A">
      Reads
    </text>
    <text x="1008" y="258" font-size="11" fill="#6A6A6A">8 block drafts</text>
    <text x="1008" y="272" font-size="11" fill="#6A6A6A">EvidenceClaim ledgers</text>
    <text x="1008" y="286" font-size="11" fill="#6A6A6A">Deterministic features</text>
    <text x="1008" y="300" font-size="11" fill="#6A6A6A">Triage prior</text>
    <text x="1008" y="324" font-size="12" font-weight="600" fill="#1A1A1A">
      Emits
    </text>
    <text x="1008" y="340" font-size="11" fill="#6A6A6A">ExecutiveSummary</text>
    <text x="1008" y="354" font-size="11" fill="#6A6A6A">Confidence + grade</text>
    <text x="1008" y="364" font-size="11" fill="#6A6A6A">Risks, citations</text>

    <!-- Model chip -->
    <rect x="996" y="384" width="100" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A" stroke-width="0.75"/>
    <text x="1046" y="399" font-size="11.5" font-weight="600" fill="#FFFFFF"
          text-anchor="middle">Sonnet</text>
    <text x="1106" y="399" font-size="11.5" fill="#3A3A3A">in-process</text>

    <!-- Footnote: NOT a Managed Agent -->
    <text x="996" y="426" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Not a Managed Agent &#8212; runs
    </text>
    <text x="996" y="440" font-size="10.5" font-style="italic" fill="#7A7A7A">
      via messages.create on the v2
    </text>
    <text x="996" y="454" font-size="10.5" font-style="italic" fill="#7A7A7A">
      code path (CLAUDE.md).
    </text>

    <!-- Output caption -->
    <text x="996" y="500" font-size="11.5" font-weight="600" fill="#3A3A3A">
      &#8594; SurfaceomeRecord
    </text>
    <text x="996" y="516" font-size="11" fill="#6A6A6A">
      written to D1
    </text>
    <text x="996" y="530" font-size="11" fill="#6A6A6A">
      &#43; viewer/public/data/&#8230;
    </text>
  </g>

  <!-- ============================================================== -->
  <!-- Connectors: stages flow left-to-right; side inputs feed in      -->
  <!-- ============================================================== -->
  <g id="connectors-main" stroke="#3A3A3A" stroke-width="2" fill="none">
    <!-- Stage 1 → Stage 2 -->
    <line x1="586" y1="335" x2="614" y2="335" marker-end="url(#arrow)"/>
    <!-- Stage 2 → Stage 3 -->
    <line x1="946" y1="335" x2="974" y2="335" marker-end="url(#arrow)"/>
  </g>

  <g id="connectors-inputs" stroke="#8A8A8A" stroke-width="1.5"
     stroke-dasharray="4 3" fill="none">
    <!-- Triage record → Stage 1 (top) -->
    <line x1="246" y1="149" x2="298" y2="149" marker-end="url(#arrow-faded)"/>
    <!-- Triage record → Stage 2 (curved over the top) -->
    <path d="M 240,128 C 360,80 700,80 760,168" marker-end="url(#arrow-faded)"/>
    <!-- Triage record → Stage 3 (curved over the top) -->
    <path d="M 240,124 C 400,40 1000,40 1080,168" marker-end="url(#arrow-faded)"/>
    <!-- Deterministic features → Stage 1 (bottom) -->
    <line x1="286" y1="514" x2="298" y2="514" marker-end="url(#arrow-faded)"/>
    <!-- Deterministic features → Stage 2 -->
    <path d="M 280,514 C 420,580 580,580 760,494" marker-end="url(#arrow-faded)"/>
    <!-- Deterministic features → Stage 3 -->
    <path d="M 280,520 C 480,600 940,600 1080,494" marker-end="url(#arrow-faded)"/>
  </g>

  <!-- ============================================================== -->
  <!-- Legend                                                          -->
  <!-- ============================================================== -->
  <g id="legend">
    <text x="40" y="606" font-size="11" font-weight="700"
          letter-spacing="0.06em" fill="#6A6A6A">LEGEND</text>
    <!-- Sonnet -->
    <rect x="40" y="616" width="56" height="16" rx="8" ry="8"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="68" y="628" font-size="10.5" font-weight="600" fill="#FFFFFF"
          text-anchor="middle">Sonnet</text>
    <text x="104" y="628" font-size="11" fill="#3A3A3A">claude-sonnet-4-6</text>
    <!-- Haiku -->
    <rect x="220" y="616" width="56" height="16" rx="8" ry="8"
          fill="#C07830" stroke="#C07830"/>
    <text x="248" y="628" font-size="10.5" font-weight="600" fill="#FFFFFF"
          text-anchor="middle">Haiku</text>
    <text x="284" y="628" font-size="11" fill="#3A3A3A">claude-haiku-4-5</text>
    <!-- Deterministic -->
    <rect x="400" y="616" width="56" height="16" rx="8" ry="8"
          fill="#E6E2DC" stroke="#A8A8A8"/>
    <text x="428" y="628" font-size="10.5" font-weight="600" fill="#3A3A3A"
          text-anchor="middle">det.</text>
    <text x="464" y="628" font-size="11" fill="#3A3A3A">deterministic (no LLM)</text>
    <!-- Dashed input -->
    <line x1="608" y1="624" x2="640" y2="624" stroke="#8A8A8A"
          stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="648" y="628" font-size="11" fill="#3A3A3A">side input</text>
    <!-- Solid flow -->
    <line x1="744" y1="624" x2="776" y2="624" stroke="#3A3A3A"
          stroke-width="2"/>
    <text x="784" y="628" font-size="11" fill="#3A3A3A">main flow</text>
  </g>

</svg>
