name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --frozen
      - name: Validate lockfile
        run: uv lock --check
      - name: Run Python checks
        # Wire the public-D1 read creds so tests/test_d1_records_schema_drift.py
        # can enumerate every published record and validate it against the
        # current SurfaceomeRecord Pydantic schema. Without these the test
        # skips and stale-shape records (the OLDREC / FAKE3 / FAKE1 class)
        # silently land on main, crash the Pages SSG, and freeze prod.
        # Fork PRs don't get the secrets — the test skips there too, which
        # is fine: the org-internal PR merge is the gate that matters.
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_SURFACEOME_PUBLIC_ID: ${{ secrets.CLOUDFLARE_D1_SURFACEOME_PUBLIC_ID }}
        run: bash scripts/check-py.sh
      - name: Run pre-commit hooks
        run: uv run --frozen pre-commit run --all-files --config .pre-commit-config.yaml
