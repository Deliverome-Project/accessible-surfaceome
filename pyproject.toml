[project]
name = "accessible-surfaceome"
version = "0.1.0"
description = "Standalone accessible surface-proteome annotation pipeline"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "goatools>=1.6.4",
    "httpx>=0.28.0",
    "mygene>=3.2.2",
    "openpyxl>=3.1.5",
    "pandas>=2.3.0",
    "polars>=1.39.0",
    "pydantic>=2.11.0",
    "pydantic-ai>=0.0.16",
    "requests>=2.32.0",
    "sqlite-utils>=3.38",
    "xlrd>=2.0.2",
]

[project.scripts]
accessible-surfaceome = "surface_proteome.cli:main"
surface-proteome = "surface_proteome.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/surface_proteome"]

[dependency-groups]
dev = [
    "pre-commit>=4.3.0",
    "pytest>=8.4.0",
    "ruff>=0.13.0",
]
