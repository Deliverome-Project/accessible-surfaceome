<?xml version="1.0" encoding="UTF-8"?>
<!--
  Deep-dive pipeline flow — high-level publication figure.

  Reflects PR #54 / claude/youthful-cannon-0750be circa 2026-06,
  with the in-flight refactor that promotes risks + evidence-quality
  to A1+A2 block builders (outside the synthesizer).

  Architecture notes baked into the layout:
    * Stage 2 (Structural + topology data) feeds Stage 4 DIRECTLY.
      The block builders work from evidence ledgers; only the
      evidence-grade builder gets extra context (triage prior +
      family tags). Reflected by the bypass arrow over Stage 3.
    * Stage 1's full-text fetch uses PMC first, with the Unpaywall
      PDF as a fallback only when PMC has no full text.

  Pure shapes + text; every visual unit has an <g id> handle for
  selection/restyling in Illustrator.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1320 560"
     width="1320" height="560"
     font-family="Manrope, Inter, system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3A3A3A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1320" height="560" fill="#FFFFFF"/>

  <!-- =========================================================== -->
  <!-- Card 1: Stage 1 — Evidence retrieval                         -->
  <!-- =========================================================== -->
  <g id="card-stage1">
    <rect x="32" y="60" width="380" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="48" y="86" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 1</text>
    <text x="48" y="106" font-size="16" font-weight="700" fill="#1A1A1A">
      Evidence retrieval
    </text>
    <text x="48" y="122" font-size="11.5" fill="#6A6A6A">
      Surface Evidence + Surface Expression agents
    </text>

    <!-- Sub-panel A: Deterministic search seeds (compact, no chip list) -->
    <g id="stage1-kickoff">
      <rect x="48" y="134" width="348" height="44" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="154" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">DETERMINISTIC SEARCH SEEDS</text>
      <text x="60" y="170" font-size="11" fill="#5A5A5A">
        template-driven query anchors, fired in parallel  (no LLM)
      </text>
    </g>

    <!-- Sub-panel B: Literature retrieval sources -->
    <g id="stage1-retrieval">
      <rect x="48" y="190" width="348" height="62" rx="6" ry="6"
            fill="#EFF4F2" stroke="#9CB7AE" stroke-width="1"/>
      <text x="60" y="210" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#2E5A4C">LITERATURE RETRIEVAL  (no LLM)</text>
      <g font-size="11.5">
        <rect x="60" y="222" width="92" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="106" y="237" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubMed</text>
        <rect x="160" y="222" width="110" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="215" y="237" font-weight="600" fill="#FFFFFF" text-anchor="middle">Europe PMC</text>
        <rect x="278" y="222" width="92" height="22" rx="11" ry="11"
              fill="#3D6B60" stroke="#3D6B60"/>
        <text x="324" y="237" font-weight="600" fill="#FFFFFF" text-anchor="middle">PubTator</text>
      </g>
    </g>

    <!-- Sub-panel C: Per-paper pipeline -->
    <g id="stage1-pipeline">
      <rect x="48" y="264" width="348" height="174" rx="6" ry="6"
            fill="#FFFFFF" stroke="#A8A8A8" stroke-width="1"/>
      <text x="60" y="284" font-size="11" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">PER-PAPER PIPELINE</text>

      <g id="step-abstract-triage">
        <text x="60" y="306" font-size="12.5" font-weight="600" fill="#1A1A1A">abstract triage</text>
        <text x="60" y="320" font-size="10.5" fill="#6A6A6A">discard &#183; keep abstract &#183; worth fetching</text>
        <rect x="330" y="299" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="358" y="311" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="step-fulltext-fetch">
        <text x="60" y="338" font-size="12.5" font-weight="600" fill="#1A1A1A">full-text fetch</text>
        <text x="60" y="352" font-size="10.5" fill="#6A6A6A">PMC; Unpaywall PDF fallback when PMC has no body</text>
        <rect x="330" y="331" width="56" height="18" rx="9" ry="9" fill="#3D6B60"/>
        <text x="358" y="343" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
      </g>
      <g id="step-trim">
        <text x="60" y="370" font-size="12.5" font-weight="600" fill="#1A1A1A">trim</text>
        <text x="60" y="384" font-size="10.5" fill="#6A6A6A">per-paper clip pruning</text>
        <rect x="330" y="363" width="56" height="18" rx="9" ry="9" fill="#C07830"/>
        <text x="358" y="375" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
      </g>
      <g id="step-select">
        <text x="60" y="402" font-size="12.5" font-weight="600" fill="#1A1A1A">select</text>
        <text x="60" y="416" font-size="10.5" fill="#6A6A6A">final evidence picks</text>
        <rect x="330" y="395" width="56" height="18" rx="9" ry="9" fill="#6B1A2A"/>
        <text x="358" y="407" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
      </g>
    </g>

    <text x="48" y="462" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; Surface Evidence + Surface Expression evidence ledgers
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 2: Stage 2 — Structural + topology data                 -->
  <!-- =========================================================== -->
  <g id="card-stage2">
    <rect x="436" y="60" width="220" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="452" y="86" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 2</text>
    <text x="452" y="106" font-size="16" font-weight="700" fill="#1A1A1A">Structural +</text>
    <text x="452" y="124" font-size="16" font-weight="700" fill="#1A1A1A">topology data</text>

    <rect x="452" y="140" width="148" height="22" rx="11" ry="11"
          fill="#E6E2DC" stroke="#A8A8A8" stroke-width="0.75"/>
    <text x="526" y="155" font-size="11" font-weight="600"
          fill="#3A3A3A" text-anchor="middle">no LLM  &#8226;  data lookup</text>

    <g id="stage2-sources" font-size="11.5" fill="#1A1A1A">
      <text x="452" y="190" font-weight="600">Sources</text>
      <text x="452" y="212">&#8226; DeepTMHMM topology</text>
      <text x="452" y="232">&#8226; AlphaFold structure + pLDDT</text>
      <text x="452" y="252">&#8226; PDBe SIFTS  best PDB</text>
      <text x="452" y="272">&#8226; SURFACE-Bind sites</text>
      <text x="452" y="292">&#8226; Compara paralogs</text>
      <text x="452" y="312">&#8226; cross-species orthologs</text>
      <text x="452" y="332">&#8226; Schweke 2024 homo-oligomers</text>
    </g>

    <text x="452" y="476" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Flows directly to the
    </text>
    <text x="452" y="492" font-size="10.5" font-style="italic" fill="#7A7A7A">
      synthesizer (bypasses
    </text>
    <text x="452" y="506" font-size="10.5" font-style="italic" fill="#7A7A7A">
      the block builders).
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 3: Stage 3 — Block builders                             -->
  <!-- =========================================================== -->
  <g id="card-stage3">
    <rect x="680" y="60" width="380" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="696" y="86" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 3</text>
    <text x="696" y="106" font-size="16" font-weight="700" fill="#1A1A1A">
      Block builders
    </text>
    <text x="696" y="122" font-size="11.5" fill="#6A6A6A">
      run in parallel; one Sonnet call per block
    </text>

    <!-- Surface Evidence column (4 boxes) -->
    <g id="builders-surface-evidence">
      <text x="696" y="146" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">SURFACE EVIDENCE</text>
      <rect x="696" y="154" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="704" y="172" font-size="11.5" font-weight="600" fill="#1A1A1A">evidence quality</text>
      <rect x="696" y="186" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="704" y="204" font-size="11.5" font-weight="600" fill="#1A1A1A">detection methods</text>
      <rect x="696" y="218" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="704" y="236" font-size="11.5" font-weight="600" fill="#1A1A1A">conflicting evidence</text>
      <rect x="696" y="250" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="704" y="268" font-size="11.5" font-weight="600" fill="#1A1A1A">risks</text>
    </g>

    <!-- Surface Expression column (7 boxes) -->
    <g id="builders-surface-expression">
      <text x="876" y="146" font-size="10.5" font-weight="700"
            letter-spacing="0.06em" fill="#6A6A6A">SURFACE EXPRESSION</text>
      <rect x="876" y="154" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="172" font-size="11.5" font-weight="600" fill="#1A1A1A">evidence quality</text>
      <rect x="876" y="186" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="204" font-size="11.5" font-weight="600" fill="#1A1A1A">tissue expression</text>
      <rect x="876" y="218" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="236" font-size="11.5" font-weight="600" fill="#1A1A1A">cell states</text>
      <rect x="876" y="250" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="268" font-size="11.5" font-weight="600" fill="#1A1A1A">subcellular location</text>
      <rect x="876" y="282" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="300" font-size="11.5" font-weight="600" fill="#1A1A1A">anatomical accessibility</text>
      <rect x="876" y="314" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="332" font-size="11.5" font-weight="600" fill="#1A1A1A">accessibility modulation</text>
      <rect x="876" y="346" width="168" height="28" rx="5" ry="5"
            fill="#FFFFFF" stroke="#A8A8A8"/>
      <text x="884" y="364" font-size="11.5" font-weight="600" fill="#1A1A1A">risks</text>
    </g>

    <!-- Model chip -->
    <rect x="696" y="402" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="736" y="417" font-size="11.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>

    <!-- OE note -->
    <text x="696" y="446" font-size="10.5" font-style="italic" fill="#7A7A7A">
      Overexpression context, when used, is recorded
    </text>
    <text x="696" y="460" font-size="10.5" font-style="italic" fill="#7A7A7A">
      inside the detection methods block.
    </text>

    <text x="696" y="492" font-size="11" font-weight="600" fill="#3A3A3A">
      &#8594; block drafts (one per builder)
    </text>
  </g>

  <!-- =========================================================== -->
  <!-- Card 4: Stage 4 — Synthesizer                                -->
  <!-- =========================================================== -->
  <g id="card-stage4">
    <rect x="1084" y="60" width="200" height="460" rx="10" ry="10"
          fill="#F7F5F2" stroke="#B5AC9E" stroke-width="1.5"/>
    <text x="1100" y="86" font-size="11" font-weight="700"
          letter-spacing="0.08em" fill="#6A6A6A">STAGE 4</text>
    <text x="1100" y="106" font-size="16" font-weight="700" fill="#1A1A1A">Synthesizer</text>

    <rect x="1100" y="124" width="80" height="22" rx="11" ry="11"
          fill="#6B1A2A" stroke="#6B1A2A"/>
    <text x="1140" y="139" font-size="11.5" font-weight="600"
          fill="#FFFFFF" text-anchor="middle">Sonnet</text>

    <g id="syn-reads" font-size="11.5" fill="#1A1A1A">
      <text x="1100" y="176" font-weight="600">Reads</text>
      <text x="1100" y="196">&#8226; block drafts</text>
      <text x="1100" y="214">&#8226; both evidence ledgers</text>
      <text x="1100" y="232">&#8226; structural data</text>
      <text x="1100" y="250">&#8226; triage prior</text>
    </g>

    <g id="syn-emits" font-size="11.5" fill="#1A1A1A">
      <text x="1100" y="288" font-weight="600">Emits</text>
      <text x="1100" y="308">&#8226; executive summary</text>
      <text x="1100" y="326">&#8226; filter rollups</text>
      <text x="1100" y="344">&#8226; confidence + rationale</text>
    </g>
  </g>

  <!-- =========================================================== -->
  <!-- Connectors                                                    -->
  <!--   Stage 1 -> Stage 3 (arcs over Stage 2): evidence ledgers   -->
  <!--   Stage 2 -> Stage 4 (arcs over Stage 3): structural data    -->
  <!--   Stage 3 -> Stage 4 (short, straight): block drafts         -->
  <!-- =========================================================== -->
  <g id="connectors" stroke="#3A3A3A" stroke-width="2" fill="none">
    <path d="M 414,290 C 500,20 620,20 678,290" marker-end="url(#arrow)"/>
    <path d="M 658,290 C 760,20 1020,20 1082,290" marker-end="url(#arrow)"/>
    <line x1="1062" y1="290" x2="1082" y2="290" marker-end="url(#arrow)"/>
  </g>

  <!-- =========================================================== -->
  <!-- Legend                                                       -->
  <!-- =========================================================== -->
  <g id="legend" font-size="11" fill="#3A3A3A">
    <rect x="40" y="532" width="50" height="16" rx="8" ry="8" fill="#6B1A2A"/>
    <text x="65" y="544" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Sonnet</text>
    <text x="98" y="544">claude-sonnet-4-6</text>

    <rect x="220" y="532" width="50" height="16" rx="8" ry="8" fill="#C07830"/>
    <text x="245" y="544" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">Haiku</text>
    <text x="278" y="544">claude-haiku-4-5</text>

    <rect x="396" y="532" width="50" height="16" rx="8" ry="8" fill="#3D6B60"/>
    <text x="421" y="544" font-size="10.5" font-weight="600" fill="#FFFFFF" text-anchor="middle">tool</text>
    <text x="454" y="544">deterministic / retrieval (no LLM)</text>
  </g>

</svg>
